<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAr4MsvF2HXnDUBBJLhx6fw7VEVjtWXUn8",
  authDomain: "apcs-a821e.firebaseapp.com",
  projectId: "apcs-a821e",
  storageBucket: "apcs-a821e.firebasestorage.app",
  messagingSenderId: "421769783715",
  appId: "1:421769783715:web:89b54b92cdad24f9351216"
};

try {
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  window._db = db;
  window._fsSetDoc    = (path, data) => setDoc(doc(db, ...path.split('/')), data);
  window._fsDeleteDoc = (path) => deleteDoc(doc(db, ...path.split('/')));

  onSnapshot(collection(db, 'purchase_products'), snap => {
    window._products = snap.docs.map(d => d.data()).sort((a,b)=>a.id-b.id);
    if (window.renderProducts) window.renderProducts();
  });
  onSnapshot(collection(db, 'purchase_months'), snap => {
    window._months = snap.docs.map(d => d.data()).sort((a,b)=>(a.year*100+a.month)-(b.year*100+b.month));
    if (document.getElementById('tab-purchase').classList.contains('active') && window.renderPurchase) window.renderPurchase();
    if (document.getElementById('tab-export').classList.contains('active') && window.renderExport) window.renderExport();
  });

  window._firebaseReady = true;
  document.getElementById('sync-status').innerHTML = '🟢 リアルタイム同期中';
  document.getElementById('sync-status').style.color = 'var(--green)';
  document.getElementById('topbar-sync').innerHTML = '<span style="color:var(--green)">🟢 同期中</span>';
} catch(e) {
  console.warn('Firebase init failed:', e);
}
</script>

window._newImgB64 = null;

// ── 画像圧縮（Base64変換）
function compressImage(file, maxW=600, quality=0.75) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function previewNewImg(input) {
  const file = input.files[0];
  if (!file) return;
  compressImage(file).then(b64 => {
    window._newImgB64 = b64;
    const prev = document.getElementById('new-img-preview');
    prev.innerHTML = `<img src="${b64}" style="width:100%;height:100%;object-fit:cover;border-radius:9px">`;
    document.getElementById('new-img-clear').style.display = 'inline-flex';
  });
}
function clearNewImg() {
  window._newImgB64 = null;
  document.getElementById('new-img-preview').innerHTML = '📷';
  document.getElementById('new-img-clear').style.display = 'none';
  document.getElementById('new-img-input').value = '';
}

// 既存商品の画像変更
function triggerImgChange(id) {
  const input = document.getElementById('img-input-'+id);
  if (input) input.click();
}
async function onImgChange(input, id) {
  const file = input.files[0];
  if (!file) return;
  toast('画像を処理中...');
  const b64 = await compressImage(file);
  const p = window._products.find(x => x.id === id);
  if (!p) return;
  p.image = b64;
  await fsSet(`purchase_products/${id}`, p);
  toast('画像を更新しました');
}
async function removeImg(id) {
  const p = window._products.find(x => x.id === id);
  if (!p) return;
  delete p.image;
  await fsSet(`purchase_products/${id}`, p);
  toast('画像を削除しました');
}

// モーダル
function openImgModal(src) {
  document.getElementById('img-modal-img').src = src;
  document.getElementById('img-modal').style.display = 'flex';
}
function closeImgModal() {
  document.getElementById('img-modal').style.display = 'none';
}

// ── ユーティリティ
function fmt(n){if(n==null||isNaN(n))return'—';return'¥'+Math.round(n).toLocaleString('ja-JP');}
function fmtYuan(n){if(n==null||isNaN(n))return'—';return n.toLocaleString('ja-JP',{minimumFractionDigits:0,maximumFractionDigits:2})+' 元';}
function calcAmt(c,r){return c*r;}
function ordinal(n){return['1つ目','2つ目','3つ目','4つ目','5つ目','6つ目','7つ目','8つ目','9つ目','10つ目'][n-1]||(n+'つ目');}
function roundLabel(n){return['1回目','2回目','3回目','4回目','5回目','6回目'][n-1]||(n+'回目');}
const RB=['rb1','rb2','rb3','rb4','rb5'];
const IBS=[
  'background:rgba(232,201,122,0.12);color:#e8c97a;border:1px solid rgba(232,201,122,0.3)',
  'background:rgba(107,164,224,0.12);color:#6ba4e0;border:1px solid rgba(107,164,224,0.3)',
  'background:rgba(107,203,139,0.12);color:#6bcb8b;border:1px solid rgba(107,203,139,0.3)',
  'background:rgba(180,107,224,0.12);color:#b46be0;border:1px solid rgba(180,107,224,0.3)',
  'background:rgba(224,160,107,0.12);color:#e0a06b;border:1px solid rgba(224,160,107,0.3)',
];

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
function isReady(){return!!window._firebaseReady;}
async function fsSet(path,data){if(!isReady())return;await window._fsSetDoc(path,data);}
async function fsDel(path){if(!isReady())return;await window._fsDeleteDoc(path);}
function monthKey(y,m){return`${y}-${String(m).padStart(2,'0')}`;}

const TAB_TITLES={products:'商品登録',purchase:'月別仕入れ計算',export:'集計・出力'};
function switchTab(t){
  document.querySelectorAll('.nav-item,.bottom-nav-item').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('topbar-title').textContent=TAB_TITLES[t];
  window.scrollTo(0,0);
  if(t==='purchase')renderPurchase();
  if(t==='export')renderExport();
}

// ── 商品
async function addProduct(){
  const name=document.getElementById('p-name').value.trim();
  const cost=parseFloat(document.getElementById('p-cost').value);
  const url=document.getElementById('p-url').value.trim();
  const err=document.getElementById('p-error');
  if(!name){err.textContent='商品名を入力してください';return;}
  if(isNaN(cost)||cost<0){err.textContent='有効な原価を入力してください';return;}
  err.textContent='';
  const p={id:Date.now(),name,cost,url};
  if(window._newImgB64) p.image=window._newImgB64;
  await fsSet(`purchase_products/${p.id}`,p);
  document.getElementById('p-name').value='';
  document.getElementById('p-cost').value='';
  document.getElementById('p-url').value='';
  clearNewImg();
  toast('商品を登録しました');
}
async function removeProduct(id){
  if(!confirm('この商品を削除しますか？'))return;
  await fsDel(`purchase_products/${id}`);
  toast('商品を削除しました');
}
window.renderProducts=function(){
  const el=document.getElementById('product-list');
  const ps=window._products;
  document.getElementById('product-count').textContent=`${ps.length} 件登録済み`;
  if(!ps.length){el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>まだ商品が登録されていません</div>';return;}
  el.innerHTML=ps.map(p=>`
    <div class="product-item">
      ${p.image
        ?`<img src="${p.image}" class="product-img-thumb" onclick="openImgModal('${p.image}')" title="クリックで拡大">`
        :`<div class="product-img-placeholder" onclick="triggerImgChange(${p.id})" title="画像を追加">📷</div>`}
      <input type="file" id="img-input-${p.id}" accept="image/*" class="img-upload-input" onchange="onImgChange(this,${p.id})">
      <span class="product-id">#${String(p.id).slice(-4)}</span>
      <span class="product-name">${p.name}</span>
      <span class="product-cost">${fmtYuan(p.cost)}</span>
      ${p.url?`<a href="${p.url}" target="_blank" style="color:var(--text3);font-size:11px;text-decoration:none;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.url}">${p.url}</a>`:''}
      <div style="display:flex;gap:6px;margin-left:auto">
        ${p.image?`<button class="btn sm" onclick="triggerImgChange(${p.id})">画像変更</button><button class="btn danger sm" onclick="removeImg(${p.id})">画像削除</button>`:`<button class="btn sm" onclick="triggerImgChange(${p.id})">＋ 画像追加</button>`}
        <button class="btn danger sm" onclick="removeProduct(${p.id})">削除</button>
      </div>
    </div>`).join('');
};

// ── 月
async function saveMonth(m){
  const idx=window._months.findIndex(x=>x.year===m.year&&x.month===m.month);
  if(idx>=0)window._months[idx]=m;else window._months.push(m);
  await fsSet(`purchase_months/${monthKey(m.year,m.month)}`,m);
}
function cloneMonth(mIdx){return JSON.parse(JSON.stringify(window._months[mIdx]));}

async function addMonth(){
  const ms=window._months;
  let year,month;
  if(!ms.length){const n=new Date();year=n.getFullYear();month=n.getMonth()+1;}
  else{const last=ms[ms.length-1];month=last.month+1;year=last.year;if(month>12){month=1;year++;}}
  if(ms.find(m=>m.year===year&&m.month===month))return;
  await saveMonth({year,month,rounds:[{id:Date.now(),roundSeq:1,rate:'',items:[]}]});
  toast(`${year}年${month}月を追加しました`);
}
async function removeMonth(mIdx){
  if(!confirm('この月のデータをすべて削除しますか？'))return;
  const m=window._months[mIdx];
  await fsDel(`purchase_months/${monthKey(m.year,m.month)}`);
  toast(`${m.year}年${m.month}月を削除しました`);
}
async function addRound(mIdx){const m=cloneMonth(mIdx);m.rounds.push({id:Date.now(),roundSeq:m.rounds.length+1,rate:'',items:[]});await saveMonth(m);}
async function removeRound(mIdx,rIdx){
  if(window._months[mIdx].rounds.length<=1){alert('最低1回次は必要です');return;}
  if(!confirm('この回次を削除しますか？'))return;
  const m=cloneMonth(mIdx);m.rounds.splice(rIdx,1);m.rounds.forEach((r,i)=>r.roundSeq=i+1);await saveMonth(m);
}
async function updateRate(mIdx,rIdx,val){const m=cloneMonth(mIdx);m.rounds[rIdx].rate=val;await saveMonth(m);}
async function addItem(mIdx,rIdx){const m=cloneMonth(mIdx);const r=m.rounds[rIdx];r.items.push({id:Date.now(),itemSeq:r.items.length+1,productId:''});await saveMonth(m);}
async function removeItem(mIdx,rIdx,iId){const m=cloneMonth(mIdx);const r=m.rounds[rIdx];r.items=r.items.filter(i=>i.id!==iId);r.items.forEach((i,n)=>i.itemSeq=n+1);await saveMonth(m);}
async function updateItem(mIdx,rIdx,iId,val){const m=cloneMonth(mIdx);const item=m.rounds[rIdx].items.find(i=>i.id===iId);if(item){item.productId=parseInt(val)||val;await saveMonth(m);}}

window.renderPurchase=function(){
  const area=document.getElementById('purchase-area');
  const ms=window._months;
  if(!ms.length){area.innerHTML='<div class="empty" style="padding:48px"><div class="empty-icon">📅</div>「＋ 仕入れ月追加」で月を追加してください</div>';return;}
  area.innerHTML=ms.map((m,mIdx)=>{
    const label=`${m.year}年${m.month}月`;
    let monthTotal=0;
    const roundsHtml=m.rounds.map((r,rIdx)=>{
      const rate=r.rate!==''&&r.rate!=null?parseFloat(r.rate):null;
      const rLabel=`${label} ${roundLabel(r.roundSeq)}`;
      let roundTotal=0;
      const rowsHtml=r.items.map(item=>{
        const prod=window._products.find(p=>p.id===item.productId)||null;
        const cost=prod?prod.cost:0;
        const hasData=prod&&rate!==null;
        const amt=hasData?calcAmt(cost,rate):null;
        if(amt!==null)roundTotal+=amt;
        const bs=IBS[(r.roundSeq-1)%IBS.length];
        // 画像セル
        const imgCell=prod&&prod.image
          ?`<td><img src="${prod.image}" class="item-img" onclick="openImgModal('${prod.image}')" title="クリックで拡大"></td>`
          :`<td><div class="item-img-none">📦</div></td>`;
        return `<tr>
          <td><span class="item-badge" style="${bs}">${rLabel} ${ordinal(item.itemSeq)}</span></td>
          ${imgCell}
          <td><select onchange="updateItem(${mIdx},${rIdx},${item.id},this.value)">
            <option value="">— 商品を選択 —</option>
            ${window._products.map(p=>`<option value="${p.id}" ${item.productId==p.id?'selected':''}>${p.name}（${fmtYuan(p.cost)}）</option>`).join('')}
          </select></td>
          <td class="r">${prod?fmtYuan(prod.cost):'—'}</td>
          <td class="r">${amt!==null?'<strong>'+fmt(amt)+'</strong>':'—'}</td>
          <td><button class="btn danger sm icon-only" onclick="removeItem(${mIdx},${rIdx},${item.id})">✕</button></td>
        </tr>`;
      }).join('');
      monthTotal+=roundTotal;
      const tfootHtml=r.items.length?`<tfoot><tr>
        <td colspan="4" class="tfoot-label">${rLabel} 合計</td>
        <td class="tfoot-row r">${fmt(roundTotal)}</td><td></td>
      </tr></tfoot>`:'';
      const isLast=rIdx===m.rounds.length-1;
      return `<div class="round-block">
        <div class="round-header">
          <span class="round-badge ${RB[(r.roundSeq-1)%RB.length]}">${roundLabel(r.roundSeq)}</span>
          <div class="round-rate-wrap">
            <span class="round-rate-label">仕入れ率</span>
            <input type="number" class="round-rate-input" value="${r.rate}" min="0" step="0.1" placeholder="0" onchange="updateRate(${mIdx},${rIdx},this.value)">
            <span class="round-rate-hint">${rate!==null?'→ 原価 × '+rate:'未入力'}</span>
          </div>
          <div class="round-actions">
            <button class="btn sm" onclick="addItem(${mIdx},${rIdx})">＋ 仕入れ品追加</button>
            <button class="btn danger sm" onclick="removeRound(${mIdx},${rIdx})">削除</button>
          </div>
        </div>
        ${r.items.length
          ?`<div class="table-wrap"><table>
              <thead><tr><th>品</th><th>画像</th><th>商品名</th><th class="r">原価（元）</th><th class="r">仕入れ金額（円）</th><th></th></tr></thead>
              <tbody>${rowsHtml}</tbody>${tfootHtml}
            </table></div>`
          :'<div class="empty" style="padding:20px">「＋ 仕入れ品追加」で商品を追加してください</div>'}
      </div>
      ${isLast?`<div class="add-round-row"><button class="btn ghost sm" onclick="addRound(${mIdx})">＋ 仕入れ回数追加</button></div>`:''}`;
    }).join('');
    return `<div class="month-block">
      <div class="month-header">
        <div class="month-header-left">
          <span class="month-dot"></span>
          <span class="month-title">${label}</span>
          <span class="month-total">${fmt(monthTotal)}</span>
        </div>
        <div class="month-header-actions">
          <button class="btn danger sm" onclick="removeMonth(${mIdx})">月を削除</button>
        </div>
      </div>
      ${roundsHtml}
    </div>`;
  }).join('');
};

function getSummary(){
  return window._months.map(m=>{
    let monthTotal=0;
    const rounds=m.rounds.map(r=>{
      const rate=r.rate!==''&&r.rate!=null?parseFloat(r.rate):null;
      let roundTotal=0;
      const items=r.items.map(item=>{
        const prod=window._products.find(p=>p.id===item.productId);
        const cost=prod?prod.cost:0;
        const amt=(prod&&rate!==null)?calcAmt(cost,rate):null;
        if(amt!==null)roundTotal+=amt;
        return{itemSeq:item.itemSeq,prodName:prod?prod.name:'',cost,rate,amt};
      });
      monthTotal+=roundTotal;
      return{roundSeq:r.roundSeq,rate,items,roundTotal};
    });
    return{year:m.year,month:m.month,rounds,monthTotal};
  });
}

window.renderExport=function(){
  const summary=getSummary();
  const grandTotal=summary.reduce((s,m)=>s+m.monthTotal,0);
  const avg=summary.length?grandTotal/summary.length:0;
  document.getElementById('summary-cards').innerHTML=`
    <div class="metric-card"><div class="metric-label">登録商品数</div><div class="metric-value">${window._products.length}</div><div class="metric-sub">商品マスタ</div></div>
    <div class="metric-card"><div class="metric-label">累計仕入れ金額</div><div class="metric-value">${fmt(grandTotal)}</div><div class="metric-sub">全期間合計</div></div>
    <div class="metric-card"><div class="metric-label">月平均仕入れ金額</div><div class="metric-value">${fmt(Math.round(avg))}</div><div class="metric-sub">${summary.length} ヶ月分</div></div>`;
  if(!summary.length){document.getElementById('detail-tbody').innerHTML='<tr><td colspan="6" class="empty">データがありません</td></tr>';return;}
  document.getElementById('detail-tbody').innerHTML=summary.flatMap(m=>
    m.rounds.map((r,ri)=>`<tr>
      <td>${ri===0?m.year+'年'+m.month+'月':''}</td>
      <td>${roundLabel(r.roundSeq)}</td>
      <td class="r">${r.rate!==null?r.rate:'—'}</td>
      <td class="r">${r.items.length} 品</td>
      <td class="r">${fmt(r.roundTotal)}</td>
      <td class="r">${ri===0?'<strong>'+fmt(m.monthTotal)+'</strong>':''}</td>
    </tr>`)
  ).join('');
};

function exportExcel(){
  if(typeof XLSX==='undefined'){alert('ライブラリ読込中です');return;}
  const wb=XLSX.utils.book_new();
  const summary=getSummary();
  const s1=[['年月','回次','仕入れ率','品数','回次合計(円)','月合計(円)']];
  summary.forEach(m=>m.rounds.forEach((r,ri)=>{
    s1.push([`${m.year}年${m.month}月`,roundLabel(r.roundSeq),r.rate!==null?r.rate:'',r.items.length,Math.round(r.roundTotal),ri===0?Math.round(m.monthTotal):'']);
  }));
  const ws1=XLSX.utils.aoa_to_sheet(s1);ws1['!cols']=[{wch:12},{wch:8},{wch:10},{wch:6},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws1,'月別回次集計');
  const s2=[['年月','回次','品','商品名','原価(元)','仕入れ率','仕入れ金額(円)']];
  summary.forEach(m=>m.rounds.forEach(r=>r.items.forEach(i=>{
    s2.push([`${m.year}年${m.month}月`,roundLabel(r.roundSeq),ordinal(i.itemSeq),i.prodName,i.cost,i.rate!==null?i.rate:'',i.amt!==null?Math.round(i.amt):'']);
  })));
  const ws2=XLSX.utils.aoa_to_sheet(s2);ws2['!cols']=[{wch:12},{wch:8},{wch:8},{wch:20},{wch:12},{wch:10},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,'仕入れ明細');
  const s3=[['商品名','原価(元)','仕入れ先URL']];
  window._products.forEach(p=>s3.push([p.name,p.cost,p.url]));
  const ws3=XLSX.utils.aoa_to_sheet(s3);ws3['!cols']=[{wch:20},{wch:12},{wch:40}];
  XLSX.utils.book_append_sheet(wb,ws3,'商品マスタ');
  XLSX.writeFile(wb,'仕入れ管理_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('Excelファイルをエクスポートしました');
}
</script>
